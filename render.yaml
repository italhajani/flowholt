services:
  - type: web
    name: flowholt-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ALLOW_DEV_LOGIN
        value: "false"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SCHEDULER_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: LLM_MODE
        value: mock
